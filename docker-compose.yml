services:
  backend:
    build: ./backend
    container_name: nexoranode-panel-api
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      PLANS_FILE: /data/plans/plans.json
    volumes:
      - ${BOT_ROOT_HOST:-/opt/nexoranode-bot}:/bot:ro
      - ${PLANS_DIR_HOST:-${BOT_ROOT_HOST:-/opt/nexoranode-bot}/app/data}:/data/plans:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nexora_net
    command: >
      sh -c "uvicorn panel.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://manage.nexoranode.xyz:2053/api}
        BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Nexoranode Admin}
    container_name: nexoranode-panel-web
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nexora_net

networks:
  nexora_net:
    external: true
    name: ${DOCKER_NETWORK:-nexora_net}
