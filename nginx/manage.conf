# manage.nexoranode.xyz — host nginx (NOT port 443 — Reality uses that)
# Public URL: https://manage.nexoranode.xyz:2053

server {
    listen 2052;
    server_name manage.nexoranode.xyz;
    return 301 https://$host:2053$request_uri;
}

server {
    listen 2053 ssl;
    server_name manage.nexoranode.xyz;

    ssl_certificate     /etc/letsencrypt/live/manage.nexoranode.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manage.nexoranode.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/cloudflare-ips.conf;
    deny all;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
